name: comparativa

mgmt:
  network: snmp-expo
  ipv4-subnet: 172.100.100.0/24  
  
topology:
  nodes:
    
    # Nokia SRL Linux Layer 2 Device
    srlswitch2:
      kind: nokia_srlinux
      image: ghcr.io/nokia/srlinux:24.10.1
      type: ixr-d3
      startup-config: configs/srlswitch.cfg 
            
    # Nokia SRL Linux Router
    srlrouter:
      kind: nokia_srlinux
      image: ghcr.io/nokia/srlinux:24.10.1
      type: ixr-d3
      startup-config: configs/srlrouter.cfg
      
    #arista-router:
      #kind: arista_veos
      #mgmt-ipv4: 172.100.100.7
      #image: vrnetlab/arista_veos:4.35.1F
      #startup-config: configs/myconfig.txt      

    prometheus:
      kind: linux
      mgmt-ipv4: 172.100.100.42
      image: quay.io/prometheus/prometheus:v2.54.1
      binds:
        - config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      cmd: --config.file=/etc/prometheus/prometheus.yml
      ports:
        - 9090:9090

    grafana:
      kind: linux
      mgmt-ipv4: 172.100.100.43
      image: grafana/grafana:latest
      binds:
        - config/grafana/datasource.yml:/etc/grafana/provisioning/datasources/datasource.yaml:ro
        - config/grafana/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yaml:ro
        - config/grafana/dashboards:/var/lib/grafana/dashboards
      ports:
        - 3000:3000
      env:        
        # env vars to enable anonymous access
        GF_ORG_ROLE: "Admin"
        GF_ORG_NAME: "Main Org"
        GF_AUTH_ANONYMOUS_ENABLED: "true"
        GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
        GF_AUTH_ANONYMOUS: "true"
        GF_AUTH_OAUTH_AUTO_LOGIN: "true"    
              
    PC1:
      kind: linux
      image: docker.io/esanchezv/kaliipv6:latest
      binds:
        - scripts/:/root
      exec:
        - chmod +x /root/install_py.sh
        - sh /root/install_py.sh        

    PC2:
      kind: linux
      image: docker.io/esanchezv/kaliipv6:latest

    PC3:
      kind: linux
      image: docker.io/esanchezv/kaliipv6:latest  
    
        
    snmp-exporter:
      kind: linux
      image: prom/snmp-exporter:latest
      #binds:
        #- configs/snmp_exporter/snmp.yml:/etc/snmp_exporter/snmp.yml:ro
      ports:
        - 9116:9116
    
    alpine:
      kind: linux
      image: esanchezv/alpine-python3:latest
      binds:
         - configs/snmp.sh:/root/snmp.sh
         - configs/snmp-monitor.py:/root/snmp-monitor.py
      exec:
         - ip -6 addr add 2001:db8:20::100/64 dev eth1
         - mkdir /data
         - chmod +x /data
         - python3 -m pip config set global.break-system-packages true
         - chmod +x /root/snmp.sh
         - sh /root/snmp.sh      
    
    
  links:
    - endpoints: ["srlrouter:e1-1", "srlswitch2:e1-1"]
    - endpoints: ["PC1:eth1", "srlswitch2:e1-2"]
      mtu: 1500
    - endpoints: ["PC2:eth1", "srlswitch2:e1-3"]
      mtu: 1500
    - endpoints: ["PC3:eth1", "srlswitch2:e1-4"]
      mtu: 1500  
    #- endpoints: ["alpine:eth1", "srlswitch2:e1-5"]
      #mtu: 1500  
      
    
     
     
